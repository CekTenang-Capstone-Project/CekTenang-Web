openapi: 3.0.0
info:
  title: CekTenang API (Stress Detector)
  description: API documentation for the CekTenang Student Stress Detector application.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []

paths:
  /users:
    post:
      summary: Register a new user
      tags:
        - Users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullname
                - email
                - password
              properties:
                fullname:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Validation error or email exists
    get:
      summary: Get users by email
      tags:
        - Users
      parameters:
        - in: query
          name: email
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved users
  
  /users/{id}:
    get:
      summary: Get a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved user

  /authentications:
    post:
      summary: Login
      tags:
        - Authentications
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Login successful, returns tokens
    put:
      summary: Refresh Access Token
      tags:
        - Authentications
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
    delete:
      summary: Logout
      tags:
        - Authentications
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully

  /profiles/me:
    get:
      summary: Get current user profile
      tags:
        - Profiles
      responses:
        '200':
          description: Profile retrieved successfully

  /profiles/info:
    put:
      summary: Update profile info
      tags:
        - Profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullname
              properties:
                fullname:
                  type: string
      responses:
        '200':
          description: Profile updated successfully

  /profiles/password:
    put:
      summary: Update password
      tags:
        - Profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated successfully

  /profiles/picture:
    put:
      summary: Upload profile picture
      tags:
        - Profiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile picture uploaded successfully

  /activities:
    post:
      summary: Submit a new daily activity
      tags:
        - Activities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activityDate:
                  type: string
                  format: date
                sleepHours:
                  type: number
                studyHours:
                  type: number
                screenTimeHours:
                  type: number
                socialMediaHours:
                  type: number
                physicalActivityMinutes:
                  type: integer
                caffeineIntakeMg:
                  type: integer
                moodScore:
                  type: integer
                  minimum: 1
                  maximum: 10
                fatigueLevel:
                  type: integer
                  minimum: 1
                  maximum: 10
                assignmentLoad:
                  type: integer
                deadlinePressure:
                  type: integer
                  minimum: 1
                  maximum: 10
                socialInteractionScore:
                  type: integer
                  minimum: 1
                  maximum: 10
                financialWorryScore:
                  type: integer
                  minimum: 1
                  maximum: 10
                healthConditionScore:
                  type: integer
                  minimum: 1
                  maximum: 10
      responses:
        '201':
          description: Activity created successfully
    get:
      summary: Get own activities
      tags:
        - Activities
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Retrieved activities successfully

  /activities/{id}:
    get:
      summary: Get a specific activity
      tags:
        - Activities
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved activity successfully
    delete:
      summary: Delete an activity
      tags:
        - Activities
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted activity successfully
